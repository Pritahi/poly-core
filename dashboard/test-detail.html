<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poly — Test Detail</title>
<style>
:root {
  --bg: #09090b;
  --surface: #111114;
  --surface-2: #18181b;
  --border: #27272a;
  --text: #fafafa;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --purple: #8b5cf6;
  --purple-light: #a78bfa;
  --green: #22c55e;
  --yellow: #eab308;
  --orange: #f97316;
  --red: #ef4444;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  --radius: 8px;
  --radius-sm: 6px;
  --radius-xs: 4px;
  --transition: 0.15s ease;
  --transition-page: 0.3s ease;
  --sidebar-w: 220px;
  --sidebar-collapsed: 60px;
  --topbar-h: 56px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== SIDEBAR ===== */
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  transition: width var(--transition-page);
  overflow: hidden;
}
.sidebar.collapsed { width: var(--sidebar-collapsed); }

.sidebar-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px;
  height: var(--topbar-h);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-logo {
  font-size: 22px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--purple), var(--purple-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
}

.sidebar-toggle {
  position: absolute;
  top: 16px; right: -14px;
  width: 28px; height: 28px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all var(--transition);
  z-index: 101;
}
.sidebar-toggle:hover {
  background: var(--purple);
  color: var(--text);
  border-color: var(--purple);
}

.sidebar-nav {
  flex: 1;
  padding: 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: all var(--transition);
  white-space: nowrap;
  overflow: hidden;
}
.nav-item:hover { background: rgba(139, 92, 246, 0.08); color: var(--text); }
.nav-item.active { background: rgba(139, 92, 246, 0.15); color: var(--purple-light); }
.nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
.nav-label { transition: opacity var(--transition-page); }
.sidebar.collapsed .nav-label { opacity: 0; pointer-events: none; }
.sidebar.collapsed .sidebar-logo span { display: none; }

/* ===== MAIN ===== */
.main {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  transition: margin-left var(--transition-page);
}
.sidebar.collapsed ~ .main { margin-left: var(--sidebar-collapsed); }

/* ===== TOPBAR ===== */
.topbar {
  height: var(--topbar-h);
  background: rgba(9, 9, 11, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  transition: all var(--transition);
  border: 1px solid transparent;
}
.back-btn:hover {
  color: var(--text);
  background: var(--surface-2);
  border-color: var(--border);
}
.back-btn svg { width: 16px; height: 16px; }

.topbar-sep {
  width: 1px;
  height: 24px;
  background: var(--border);
}

.topbar-title {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.trust-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 14px 4px 6px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 700;
  border: 1px solid;
}

.trust-badge-circle {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #fff;
  font-weight: 700;
}

/* ===== CONTENT ===== */
.content { padding: 24px; max-width: 1000px; }

.loading-state {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 40vh;
  color: var(--text-muted);
  gap: 10px;
}

.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--purple);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-state {
  text-align: center;
  padding: 64px 24px;
  color: var(--text-muted);
}
.error-state h2 { color: var(--text-secondary); margin-bottom: 8px; font-size: 18px; }

/* ===== SECTION CARD ===== */
.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}

.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 16px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ===== METRIC GRID ===== */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 20px;
}

.metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all var(--transition);
}
.metric-card:hover { border-color: rgba(139,92,246,0.3); }

.metric-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.metric-label {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
}

.metric-weight {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--surface-2);
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
}

.metric-value-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 8px;
}

.metric-value {
  font-size: 26px;
  font-weight: 700;
  line-height: 1.2;
}

.metric-unit { font-size: 14px; color: var(--text-muted); }

.metric-bar-bg {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}

.metric-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s ease;
}

.metric-contrib {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 6px;
}
.metric-contrib span { color: var(--purple-light); font-weight: 600; }

.metric-arrow { font-size: 16px; margin-left: 4px; }
.metric-arrow.up { color: var(--green); }
.metric-arrow.down { color: var(--red); }
.metric-arrow.flat { color: var(--text-muted); }

/* ===== FLAKY CATEGORY CARD ===== */
.flaky-card {
  border-left: 3px solid var(--orange);
  padding-left: 20px;
}
.flaky-card .flaky-cat-name {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--orange);
}
.flaky-card .flaky-desc {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 12px;
  line-height: 1.7;
}
.flaky-card .flaky-rec {
  font-size: 13px;
  color: var(--text-muted);
  padding: 10px 14px;
  background: var(--surface-2);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
.flaky-card .flaky-rec strong { color: var(--text-secondary); }

/* ===== CHART ===== */
.chart-container {
  position: relative;
  width: 100%;
  height: 280px;
}

.chart-container canvas {
  width: 100% !important;
  height: 100% !important;
  border-radius: var(--radius-sm);
}

/* ===== RUN HISTORY TABLE ===== */
.data-table { width: 100%; border-collapse: collapse; }
.data-table thead th {
  background: rgba(255,255,255,0.02);
  color: var(--text-muted);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.data-table tbody td {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(39,39,42,0.5);
  font-size: 13px;
  vertical-align: middle;
}
.data-table tbody tr:last-child td { border-bottom: none; }
.data-table tbody tr:hover { background: rgba(255,255,255,0.015); }

.status-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}
.status-dot.passed { background: var(--green); }
.status-dot.failed { background: var(--red); }
.status-dot.skipped { background: var(--text-muted); }

.mono-cell { font-family: var(--mono); font-size: 12px; }

.error-msg {
  max-width: 300px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  position: relative;
  cursor: pointer;
}
.error-msg:hover { color: var(--text-secondary); }

.error-tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 8px);
  left: 0;
  right: 0;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 12px;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-break: break-all;
  z-index: 20;
  max-height: 200px;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.error-msg:hover .error-tooltip { display: block; }

/* ===== ERROR PATTERN CARDS ===== */
.error-patterns-grid {
  display: grid;
  gap: 12px;
}

.error-pattern-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: all var(--transition);
}
.error-pattern-card:hover { border-color: rgba(139,92,246,0.3); }

.error-pattern-text {
  flex: 1;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.error-pattern-count {
  font-size: 12px;
  font-weight: 700;
  color: var(--red);
  background: rgba(239,68,68,0.1);
  padding: 2px 10px;
  border-radius: 10px;
  border: 1px solid rgba(239,68,68,0.2);
  white-space: nowrap;
  flex-shrink: 0;
}

/* Responsive */
@media (max-width: 900px) {
  .sidebar { width: var(--sidebar-collapsed); }
  .sidebar .nav-label, .sidebar .sidebar-logo span { display: none; }
  .main { margin-left: var(--sidebar-collapsed) !important; }
  .metrics-grid { grid-template-columns: 1fr; }
  .content { padding: 16px; }
}

@media (max-width: 600px) {
  .topbar { padding: 0 12px; }
  .back-btn span { display: none; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo"><span>Poly</span></div>
  </div>
  <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
    <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14">
      <path d="M3.646 3.646a.5.5 0 0 1 .708 0L8 7.293l3.646-3.647a.5.5 0 0 1 .708.708L8.707 8l3.647 3.646a.5.5 0 0 1-.708.708L8 8.707l-3.646 3.647a.5.5 0 0 1-.708-.708L7.293 8 3.646 4.354a.5.5 0 0 1 0-.708z" id="toggleIcon"/>
    </svg>
  </button>
  <nav class="sidebar-nav">
    <a href="/dashboard/" class="nav-item" data-page="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>
      </svg>
      <span class="nav-label">Dashboard</span>
    </a>
    <a href="/dashboard/tests.html" class="nav-item" data-page="tests">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <span class="nav-label">Tests</span>
    </a>
    <a href="/dashboard/guide.html" class="nav-item" data-page="guide">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <span class="nav-label">Guide</span>
    </a>
    <a href="/" style="margin-top:auto;border-top:1px solid var(--border);padding-top:14px" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      <span class="nav-label">Home</span>
    </a>
  </nav>
</aside>

<!-- Main -->
<div class="main" id="mainArea">
  <!-- Top Bar -->
  <div class="topbar">
    <a href="/dashboard/" class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      <span>Back to Dashboard</span>
    </a>
    <div class="topbar-sep"></div>
    <div class="topbar-title" id="topbarTitle">Loading...</div>
    <div class="trust-badge" id="trustBadge" style="display:none">
      <div class="trust-badge-circle" id="badgeCircle">—</div>
      <span id="badgeValue">—</span>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="content">
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <span>Loading test details...</span>
    </div>
    <div class="error-state" id="errorState" style="display:none">
      <h2>Test not found</h2>
      <p>Could not load details for this test.</p>
    </div>
    <div id="detailContent" style="display:none">

      <!-- Score Breakdown -->
      <div class="section-title" style="margin-bottom:16px">Score Breakdown</div>
      <div class="metrics-grid" id="metricsGrid"></div>

      <!-- Flaky Category -->
      <div class="section-card" id="flakyCard" style="display:none">
        <div class="section-title">Flaky Classification</div>
        <div class="flaky-card" id="flakyContent"></div>
      </div>

      <!-- Trust Score History Chart -->
      <div class="section-card">
        <div class="section-title">Trust Score History</div>
        <div class="chart-container">
          <canvas id="historyChart"></canvas>
        </div>
      </div>

      <!-- Run History -->
      <div class="section-card">
        <div class="section-title">Run History</div>
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Status</th>
              <th>Duration</th>
              <th>Error Message</th>
              <th>Trust Score</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>

      <!-- Error Pattern Analysis -->
      <div class="section-card" id="errorPatternsSection" style="display:none">
        <div class="section-title">Error Pattern Analysis</div>
        <div class="error-patterns-grid" id="errorPatternsGrid"></div>
      </div>

    </div>
  </div>
</div>

<script>
const API = window.location.origin;
const params = new URLSearchParams(window.location.search);
const repoName = params.get('repo_name') || '';
const testName = params.get('test_name') || '';
const $ = id => document.getElementById(id);

// Sidebar toggle
$('sidebarToggle').addEventListener('click', () => {
  $('sidebar').classList.toggle('collapsed');
});

// Back button with repo preserved
$('backBtn').href = '/dashboard/' + (repoName ? '?repo=' + encodeURIComponent(repoName) : '');

// Trust color
function trustColor(score) {
  if (score >= 90) return 'var(--green)';
  if (score >= 70) return 'var(--yellow)';
  if (score >= 50) return 'var(--orange)';
  return 'var(--red)';
}

function trustColorHex(score) {
  if (score >= 90) return '#22c55e';
  if (score >= 70) return '#eab308';
  if (score >= 50) return '#f97316';
  return '#ef4444';
}

// Category descriptions and recommendations
const categoryInfo = {
  timing: {
    desc: 'This test has inconsistent execution times, suggesting timeout or race condition issues.',
    rec: 'Add explicit waits or mock time-dependent components. Consider increasing timeout thresholds.'
  },
  order_dependency: {
    desc: "This test's outcome changes based on execution order. Check for shared state or test isolation issues.",
    rec: 'Ensure each test cleans up after itself. Avoid global state. Use setup/teardown fixtures to reset state.'
  },
  shared_state: {
    desc: 'This test shares state with other tests, causing intermittent failures.',
    rec: 'Isolate test state. Use unique identifiers for test data. Consider running the test in isolation.'
  },
  non_deterministic_data: {
    desc: 'This test fails due to unpredictable external data or random values.',
    rec: 'Seed random generators. Mock external APIs and data sources. Avoid assertions on non-deterministic values.'
  }
};

// Load test detail
async function loadTestDetail() {
  if (!repoName || !testName) {
    $('loadingState').style.display = 'none';
    $('errorState').style.display = 'block';
    $('errorState').querySelector('p').textContent = 'Missing repo_name or test_name parameter.';
    return;
  }

  try {
    const res = await fetch(`${API}/api/tests/${encodeURIComponent(testName)}?repo_name=${encodeURIComponent(repoName)}`);
    if (!res.ok) throw new Error('Not found');
    const data = await res.json();

    $('loadingState').style.display = 'none';
    $('detailContent').style.display = 'block';

    renderHeader(data);
    renderMetrics(data);
    renderFlakyCategory(data);
    renderChart(data.history || []);
    renderHistory(data.history || []);
    renderErrorPatterns(data.history || []);

  } catch (e) {
    $('loadingState').style.display = 'none';
    $('errorState').style.display = 'block';
  }
}

// Render header
function renderHeader(data) {
  const score = Math.round(data.trust_score || 0);
  const color = trustColorHex(score);

  $('topbarTitle').textContent = data.test_name || testName;
  document.title = `Poly — ${data.test_name || testName}`;

  $('trustBadge').style.display = 'flex';
  $('trustBadge').style.borderColor = color + '44';
  $('trustBadge').style.background = color + '11';
  $('badgeCircle').textContent = score;
  $('badgeCircle').style.background = color;
  $('badgeValue').textContent = score + '/100';
  $('badgeValue').style.color = color;
}

// Render score breakdown metrics
function renderMetrics(data) {
  const passRate = data.pass_rate || 0;
  const trend = data.recent_trend || 0;
  const durVar = data.duration_variance || 0;
  const errCons = data.error_consistency || 0;

  // Calculate contributions
  const passPoints = (passRate * 60).toFixed(1);
  const trendPoints = (Math.max(0, (50 + trend)) / 100 * 20).toFixed(1);
  const durPoints = ((100 - durVar) / 100 * 10).toFixed(1);
  const errPoints = (errCons / 100 * 10).toFixed(1);

  const trendArrow = trend > 0 ? 'up' : trend < 0 ? 'down' : 'flat';
  const trendArrowChar = trendArrow === 'up' ? '↑' : trendArrow === 'down' ? '↓' : '→';

  const stability = durVar < 15 ? 'Stable' : durVar < 40 ? 'Moderate' : 'Unstable';

  $('metricsGrid').innerHTML = `
    <div class="metric-card">
      <div class="metric-header">
        <span class="metric-label">Pass Rate</span>
        <span class="metric-weight">60% weight</span>
      </div>
      <div class="metric-value-row">
        <span class="metric-value" style="color:${trustColor(passRate*100)}">${Math.round(passRate*100)}%</span>
        <span class="metric-unit">of runs pass</span>
      </div>
      <div class="metric-bar-bg">
        <div class="metric-bar-fill" style="width:${passRate*100}%;background:${trustColor(passRate*100)}"></div>
      </div>
      <div class="metric-contrib">Contributes <span>${passPoints}</span> points</div>
    </div>
    <div class="metric-card">
      <div class="metric-header">
        <span class="metric-label">Recent Trend</span>
        <span class="metric-weight">20% weight</span>
      </div>
      <div class="metric-value-row">
        <span class="metric-value" style="color:${trend >= 0 ? 'var(--green)' : 'var(--red)'}">
          ${trend >= 0 ? '+' : ''}${trend.toFixed(1)}%
        </span>
        <span class="metric-arrow ${trendArrow}">${trendArrowChar}</span>
        <span class="metric-unit">recent vs older</span>
      </div>
      <div class="metric-bar-bg">
        <div class="metric-bar-fill" style="width:${Math.max(0, Math.min(100, (50 + trend)))}%;background:${trend >= 0 ? 'var(--green)' : 'var(--red)'}"></div>
      </div>
      <div class="metric-contrib">Contributes <span>${trendPoints}</span> points</div>
    </div>
    <div class="metric-card">
      <div class="metric-header">
        <span class="metric-label">Duration Stability</span>
        <span class="metric-weight">10% weight</span>
      </div>
      <div class="metric-value-row">
        <span class="metric-value" style="color:${durVar < 30 ? 'var(--green)' : durVar < 60 ? 'var(--yellow)' : 'var(--red)'}">
          ${durVar.toFixed(1)}%
        </span>
        <span class="metric-unit">variance (${stability})</span>
      </div>
      <div class="metric-bar-bg">
        <div class="metric-bar-fill" style="width:${100 - durVar}%;background:${durVar < 30 ? 'var(--green)' : durVar < 60 ? 'var(--yellow)' : 'var(--red)'}"></div>
      </div>
      <div class="metric-contrib">Contributes <span>${durPoints}</span> points</div>
    </div>
    <div class="metric-card">
      <div class="metric-header">
        <span class="metric-label">Error Consistency</span>
        <span class="metric-weight">10% weight</span>
      </div>
      <div class="metric-value-row">
        <span class="metric-value" style="color:${errCons > 60 ? 'var(--green)' : errCons > 30 ? 'var(--yellow)' : 'var(--red)'}">
          ${errCons.toFixed(1)}%
        </span>
        <span class="metric-unit">pattern consistency</span>
      </div>
      <div class="metric-bar-bg">
        <div class="metric-bar-fill" style="width:${errCons}%;background:${errCons > 60 ? 'var(--green)' : errCons > 30 ? 'var(--yellow)' : 'var(--red)'}"></div>
      </div>
      <div class="metric-contrib">Contributes <span>${errPoints}</span> points</div>
    </div>
  `;
}

// Render flaky category
function renderFlakyCategory(data) {
  const cat = data.flaky_category;
  if (!cat || !categoryInfo[cat]) return;

  const info = categoryInfo[cat];
  $('flakyCard').style.display = 'block';
  $('flakyContent').innerHTML = `
    <div class="flaky-cat-name">${cat.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</div>
    <div class="flaky-desc">${info.desc}</div>
    <div class="flaky-rec"><strong>Recommendation:</strong> ${info.rec}</div>
  `;
}

// Draw chart on canvas
function renderChart(history) {
  const canvas = $('historyChart');
  const container = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;

  canvas.width = container.clientWidth * dpr;
  canvas.height = container.clientHeight * dpr;

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const W = container.clientWidth;
  const H = container.clientHeight;
  const pad = { top: 20, right: 20, bottom: 40, left: 44 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Background zones
  const zoneRanges = [
    { from: 80, to: 100, color: 'rgba(34,197,94,0.06)' },
    { from: 50, to: 80, color: 'rgba(234,179,8,0.06)' },
    { from: 0, to: 50, color: 'rgba(239,68,68,0.06)' }
  ];

  zoneRanges.forEach(z => {
    const y1 = pad.top + plotH - (z.to / 100) * plotH;
    const y2 = pad.top + plotH - (z.from / 100) * plotH;
    ctx.fillStyle = z.color;
    ctx.fillRect(pad.left, y1, plotW, y2 - y1);
  });

  // Grid lines
  ctx.strokeStyle = 'rgba(39,39,42,0.6)';
  ctx.lineWidth = 1;
  for (let v = 0; v <= 100; v += 20) {
    const y = pad.top + plotH - (v / 100) * plotH;
    ctx.beginPath();
    ctx.setLineDash([4, 4]);
    ctx.moveTo(pad.left, y);
    ctx.lineTo(W - pad.right, y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Y-axis labels
  ctx.fillStyle = '#71717a';
  ctx.font = '11px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let v = 0; v <= 100; v += 20) {
    const y = pad.top + plotH - (v / 100) * plotH;
    ctx.fillText(v, pad.left - 8, y);
  }

  if (!history.length) {
    ctx.fillStyle = '#71717a';
    ctx.textAlign = 'center';
    ctx.font = '13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
    ctx.fillText('No history data', W / 2, H / 2);
    return;
  }

  // Take last 20
  const pts = history.slice(-20);
  const n = pts.length;

  // X-axis labels
  ctx.fillStyle = '#71717a';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.font = '10px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';

  const xStep = n > 1 ? plotW / (n - 1) : 0;

  pts.forEach((p, i) => {
    const x = n > 1 ? pad.left + i * xStep : pad.left + plotW / 2;
    // Show every other label if many points
    if (n <= 10 || i % 2 === 0 || i === n - 1) {
      ctx.fillText(i + 1, x, H - pad.bottom + 10);
    }
  });

  // X-axis title
  ctx.fillStyle = '#71717a';
  ctx.font = '11px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  ctx.fillText('Run #', W / 2, H - 6);

  // Y-axis title
  ctx.save();
  ctx.translate(12, H / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('Trust Score', 0, 0);
  ctx.restore();

  // Compute points
  const coords = pts.map((p, i) => {
    const x = n > 1 ? pad.left + i * xStep : pad.left + plotW / 2;
    const score = Math.max(0, Math.min(100, p.trust_score || 0));
    const y = pad.top + plotH - (score / 100) * plotH;
    return { x, y, score };
  });

  // Area fill
  if (coords.length > 1) {
    ctx.beginPath();
    ctx.moveTo(coords[0].x, pad.top + plotH);
    coords.forEach(c => ctx.lineTo(c.x, c.y));
    ctx.lineTo(coords[coords.length - 1].x, pad.top + plotH);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + plotH);
    grad.addColorStop(0, 'rgba(139,92,246,0.15)');
    grad.addColorStop(1, 'rgba(139,92,246,0.0)');
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#8b5cf6';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  coords.forEach((c, i) => {
    if (i === 0) ctx.moveTo(c.x, c.y);
    else ctx.lineTo(c.x, c.y);
  });
  ctx.stroke();

  // Dots
  coords.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x, c.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = trustColorHex(c.score);
    ctx.fill();
    ctx.strokeStyle = '#09090b';
    ctx.lineWidth = 2;
    ctx.stroke();
  });
}

// Redraw chart on resize
window.addEventListener('resize', () => {
  if (window._chartHistory) renderChart(window._chartHistory);
});

// Render run history table
function renderHistory(history) {
  window._chartHistory = history;
  const reversed = [...history].reverse();
  const body = $('historyBody');

  body.innerHTML = reversed.map((h, i) => {
    const num = reversed.length - i;
    const status = h.status || 'unknown';
    const duration = h.duration != null ? (h.duration < 1 ? (h.duration * 1000).toFixed(0) + 'ms' : h.duration.toFixed(2) + 's') : '—';
    const error = h.error_message || '';
    const score = Math.round(h.trust_score || 0);
    const time = h.run_timestamp ? new Date(h.run_timestamp).toLocaleString('en-US', {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    }) : '—';

    return `<tr>
      <td style="color:var(--text-muted);font-size:12px">${num}</td>
      <td><span class="status-dot ${status}"></span>${status.charAt(0).toUpperCase() + status.slice(1)}</td>
      <td class="mono-cell">${duration}</td>
      <td class="error-msg" title="Hover to expand">
        ${error ? escapeHtml(error) : '<span style="color:var(--text-muted)">—</span>'}
        ${error ? `<div class="error-tooltip">${escapeHtml(error)}</div>` : ''}
      </td>
      <td style="color:${trustColor(score)};font-weight:600">${score}</td>
      <td style="color:var(--text-muted);font-size:12px;white-space:nowrap">${time}</td>
    </tr>`;
  }).join('');
}

// Render error patterns
function renderErrorPatterns(history) {
  const errors = history.filter(h => h.status === 'failed' && h.error_message).map(h => h.error_message);
  if (errors.length < 2) return;

  // Count unique errors (normalize for grouping)
  const counts = {};
  errors.forEach(e => {
    // Normalize: take first 120 chars as key
    const key = e.trim().slice(0, 120);
    counts[key] = (counts[key] || 0) + 1;
  });

  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 3);

  if (!sorted.length) return;

  $('errorPatternsSection').style.display = 'block';
  $('errorPatternsGrid').innerHTML = sorted.map(([msg, count]) => `
    <div class="error-pattern-card">
      <div class="error-pattern-text">${escapeHtml(msg)}</div>
      <div class="error-pattern-count">&times;${count}</div>
    </div>
  `).join('');
}

// Escape HTML
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Init
loadTestDetail();

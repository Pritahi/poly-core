<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falsky — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 34 16'><polyline points='0,8 8,8 12,1 17,15 21,4 25,8 34,8' fill='none' stroke='%23FF4B2E' stroke-width='2.4'/></svg>">
<style>
:root{
  --ink:#0C1517;--ink2:#0F1B1E;--ink3:#0A1315;--ink4:#122024;
  --line:#1E3237;--line2:#2C464B;
  --paper:#F2E8D5;--red:#FF4B2E;--amber:#FFB020;--green:#3DDC84;
  --text:#D7E4E2;--muted:#8AA0A2;--dim:#5E767A;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;--disp:'Anton',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
::selection{background:var(--amber);color:#171310}
body{
  font-family:var(--sans);color:var(--text);background:var(--ink);min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background-image:
    radial-gradient(1100px 560px at 88% -8%,rgba(61,220,132,.05),transparent 60%),
    radial-gradient(900px 520px at -8% 40%,rgba(255,75,46,.045),transparent 55%),
    linear-gradient(rgba(120,160,165,.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(120,160,165,.045) 1px,transparent 1px);
  background-size:auto,auto,46px 46px,46px 46px;
  background-attachment:fixed;-webkit-font-smoothing:antialiased;
}
.grain{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2"/></filter><rect width="140" height="140" filter="url(%23n)"/></svg>');}

.auth-wrap{position:relative;z-index:1;width:100%;max-width:440px;padding:20px}

/* Logo */
.logo{display:flex;align-items:center;gap:10px;font-family:var(--disp);font-size:1.4rem;letter-spacing:.08em;color:var(--paper);margin-bottom:32px;justify-content:center}
.logo em{font-style:normal;color:var(--red)}

/* Card */
.card{background:var(--ink2);border:1px solid var(--line2);box-shadow:10px 10px 0 rgba(0,0,0,.5);position:relative;overflow:hidden}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:repeating-linear-gradient(-45deg,var(--amber) 0 10px,#171310 10px 20px)}
.card-head{padding:28px 32px 0;text-align:center}
.card-head h1{font-family:var(--disp);font-weight:400;font-size:1.8rem;letter-spacing:.03em;color:var(--paper);text-transform:uppercase;margin-bottom:6px}
.card-head p{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--dim)}
.card-body{padding:28px 32px 32px}

/* Google Button */
.google-btn{width:100%;padding:14px;background:var(--ink3);color:var(--text);border:1px solid var(--line2);font-family:var(--mono);font-size:13px;letter-spacing:.06em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;transition:all .18s;text-decoration:none;border-radius:2px}
.google-btn:hover{border-color:var(--amber);color:var(--amber);transform:translate(-1px,-1px);box-shadow:4px 4px 0 rgba(255,176,32,.15)}
.google-btn svg{width:20px;height:20px;flex-shrink:0}

/* Info */
.info{margin-top:20px;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--dim);line-height:1.7}
.info a{color:var(--amber);text-decoration:none}
.info a:hover{text-decoration:underline}

/* API Key display (after login) */
.apikey-box{display:none;margin-top:24px;padding:16px;background:var(--ink3);border:1px solid var(--line2)}
.apikey-box.show{display:block}
.apikey-box .label{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--dim);margin-bottom:8px;text-transform:uppercase}
.apikey-box .key{font-family:var(--mono);font-size:13px;color:var(--green);word-break:break-all;padding:10px;background:var(--ink);border:1px solid var(--line);cursor:pointer;transition:all .2s;user-select:all}
.apikey-box .key:hover{border-color:var(--green)}
.apikey-box .hint{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:8px;letter-spacing:.1em}
.apikey-box .actions{display:flex;gap:8px;margin-top:12px}
.apikey-box .actions a{flex:1;text-align:center;padding:10px;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-decoration:none;transition:all .18s;border:1px solid var(--line2);color:var(--muted)}
.apikey-box .actions a:hover{border-color:var(--amber);color:var(--amber)}
.apikey-box .actions a.primary{background:var(--amber);color:#171310;border-color:var(--amber);font-weight:600}
.apikey-box .actions a.primary:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--red)}

/* Footer */
.footer{margin-top:24px;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--dim)}
.footer a{color:var(--amber);text-decoration:none}
.footer a:hover{text-decoration:underline}

/* Seismo line animation */
.seismo{margin:20px 0 8px;opacity:.4}
.seismo svg{width:100%;height:40px}

@media(max-width:480px){
  .auth-wrap{padding:12px}
  .card-head,.card-body{padding-left:20px;padding-right:20px}
}
</style>
</head>
<body>
<div class="grain"></div>

<div class="auth-wrap">
  <div class="logo">
    <svg width="34" height="16" viewBox="0 0 34 16" fill="none"><polyline points="0,8 8,8 12,1 17,15 21,4 25,8 34,8" stroke="#FF4B2E" stroke-width="2.4"/></svg>
    FALS<em>KY</em>
  </div>

  <div class="card">
    <div class="card-head">
      <h1>Sign In</h1>
      <p>Access your trust layer</p>
    </div>
    <div class="card-body">
      <!-- Seismo line -->
      <div class="seismo">
        <svg viewBox="0 0 300 40" fill="none"><polyline points="0,20 30,20 45,20 55,5 65,35 75,10 85,28 95,20 120,20 140,20 150,8 160,32 170,15 180,25 190,20 220,20 250,20 260,12 270,28 280,20 300,20" stroke="#FF4B2E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><animate attributeName="stroke-dasharray" values="0,600;600,0" dur="3s" repeatCount="indefinite"/></polyline></svg>
      </div>

      <!-- Google Sign-In -->
      <a href="/api/user/google" class="google-btn" id="googleBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </a>

      <div class="info">
        No password needed · Free forever<br>
        Your API key is generated automatically
      </div>

      <!-- API Key Display (after login) -->
      <div class="apikey-box" id="apikeyBox">
        <div class="label">Your API Key</div>
        <div class="key" id="apikeyValue" onclick="copyKey()">—</div>
        <div class="hint">Click to copy · Keep this secret</div>
        <div class="actions">
          <a href="/dashboard/" class="primary">Open Dashboard →</a>
          <a href="#" onclick="doLogout();return false">Sign Out</a>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="/">← Back to home</a> · Falsky Trust Layer v3.0
  </div>
</div>

<script>
// Check if already logged in
(async () => {
  try {
    const res = await fetch('/api/auth/me');
    if (res.ok) {
      const data = await res.json();
      document.getElementById('googleBtn').style.display = 'none';
      document.querySelector('.info').style.display = 'none';
      document.querySelector('.seismo').style.display = 'none';
      document.getElementById('apikeyValue').textContent = data.api_key || 'No API key';
      document.getElementById('apikeyBox').classList.add('show');
      document.querySelector('.card-head h1').textContent = 'Welcome Back';
      document.querySelector('.card-head p').textContent = data.email || 'Authenticated';
    }
  } catch(e) {}
})();

function copyKey() {
  const key = document.getElementById('apikeyValue').textContent;
  navigator.clipboard.writeText(key).then(() => {
    const el = document.getElementById('apikeyValue');
    el.style.borderColor = 'var(--green)';
    setTimeout(() => el.style.borderColor = '', 1200);
  });
}

async function doLogout() {
  await fetch('/api/auth/logout', {method: 'POST'});
  location.reload();
}
</script>
</body>
</html>
